# /etc/nginx/sites-available/secretvoip-sms
# Serves the React app under https://secretvoip.com/sms/
# and proxies /sms/api/* to the Node backend on 127.0.0.1:3001

server {
    listen 443 ssl http2;
    server_name secretvoip.com;

    ssl_certificate     /etc/letsencrypt/live/secretvoip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/secretvoip.com/privkey.pem;

    # ---- Built React app under /sms ----
    location /sms/ {
        alias /var/www/secretvoip-sms/dist/;
        try_files $uri $uri/ /sms/index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Hashed assets get long cache
    location ~* ^/sms/assets/.+\.(js|css|woff2?|png|jpg|svg)$ {
        alias /var/www/secretvoip-sms/dist/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Backend API proxy ----
    location /sms/api/ {
        proxy_pass         http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name secretvoip.com;
    return 301 https://$host$request_uri;
}
